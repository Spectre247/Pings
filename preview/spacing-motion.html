<!doctype html>
<html><head><meta charset="utf-8"><title>Motion</title>
<link rel="stylesheet" href="../colors_and_type.css">
<link rel="stylesheet" href="_preview.css">
</head><body>
<div style="flex:1;display:flex;flex-direction:column;gap:12px;justify-content:center;">
  <div class="row" style="gap:14px;"><span class="token" style="width:120px;flex-shrink:0;">--ease-soft</span><span style="font-family:var(--font-mono);font-size:11px;color:var(--ink-2);">cubic-bezier(.32,.72,.24,1)</span><span class="swatch-name" style="margin-left:auto;color:var(--ink-3);">default UI</span></div>
  <div class="row" style="gap:14px;"><span class="token" style="width:120px;flex-shrink:0;">--ease-spring</span><span style="font-family:var(--font-mono);font-size:11px;color:var(--ink-2);">cubic-bezier(.34,1.56,.64,1)</span><span class="swatch-name" style="margin-left:auto;color:var(--ink-3);">decorative only</span></div>
  <div style="height:1px;background:var(--hairline);margin:4px 0;"></div>
  <div class="row" style="gap:14px;"><span class="token" style="width:120px;flex-shrink:0;">--d-fast</span><span style="font-family:var(--font-mono);font-size:11px;color:var(--ink-2);">140ms</span><span class="swatch-name" style="margin-left:auto;color:var(--ink-3);">hover, color shift</span></div>
  <div class="row" style="gap:14px;"><span class="token" style="width:120px;flex-shrink:0;">--d-base</span><span style="font-family:var(--font-mono);font-size:11px;color:var(--ink-2);">240ms</span><span class="swatch-name" style="margin-left:auto;color:var(--ink-3);">default UI transition</span></div>
  <div class="row" style="gap:14px;"><span class="token" style="width:120px;flex-shrink:0;">--d-page</span><span style="font-family:var(--font-mono);font-size:11px;color:var(--ink-2);">700ms</span><span class="swatch-name" style="margin-left:auto;color:var(--ink-3);">scroll-in fade-up entrance</span></div>
</div>
</body></html>
