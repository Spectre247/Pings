<!doctype html>
<html><head><meta charset="utf-8"><title>Letter card</title>
<link rel="stylesheet" href="../colors_and_type.css">
<link rel="stylesheet" href="_preview.css">
</head><body>
<div style="flex:1;display:flex;align-items:center;justify-content:center;">
  <div style="background:var(--bg-elevated);border:1px solid var(--hairline);border-radius:22px;padding:22px 28px;max-width:560px;box-shadow:var(--shadow-1);position:relative;">
    <div style="font-family:var(--font-serif);font-style:italic;font-size:17px;line-height:1.5;color:var(--ink-2);">
      "458 days, and I still text you good morning first. <span style="color:var(--blush-500);">soon</span> we'll skip the texting part."
    </div>
    <div style="display:flex;justify-content:space-between;align-items:center;margin-top:14px;">
      <span class="token">— for you · prague soon</span>
      <img src="../assets/illustrations/heart.svg" width="16" height="16" style="color:var(--rose-300);">
    </div>
  </div>
</div>
</body></html>
