<!doctype html>
<html><head><meta charset="utf-8"><title>Secondary palette</title>
<link rel="stylesheet" href="../colors_and_type.css">
<link rel="stylesheet" href="_preview.css">
</head><body>
<div style="display:grid;grid-template-columns:repeat(4,1fr);gap:14px;flex:1;">
  <div class="col" style="gap:6px;">
    <div style="display:flex;height:84px;border-radius:12px;overflow:hidden;border:1px solid var(--hairline);">
      <div style="flex:1;background:#EEF1E8;"></div>
      <div style="flex:1;background:#D9E0CB;"></div>
      <div style="flex:1;background:#B8C5A4;"></div>
      <div style="flex:1;background:#8E9F77;"></div>
    </div>
    <span class="swatch-name">Sage</span><span class="token">--sage-50…300</span>
  </div>
  <div class="col" style="gap:6px;">
    <div style="display:flex;height:84px;border-radius:12px;overflow:hidden;border:1px solid var(--hairline);">
      <div style="flex:1;background:#FAF1DC;"></div>
      <div style="flex:1;background:#F2DDA6;"></div>
      <div style="flex:1;background:#E5C273;"></div>
    </div>
    <span class="swatch-name">Honey</span><span class="token">--honey-50…200</span>
  </div>
  <div class="col" style="gap:6px;">
    <div style="display:flex;height:84px;border-radius:12px;overflow:hidden;border:1px solid var(--hairline);">
      <div style="flex:1;background:#FBE9EA;"></div>
      <div style="flex:1;background:#F4CBCE;"></div>
      <div style="flex:1;background:#E9A4A9;"></div>
      <div style="flex:1;background:#D67A82;"></div>
    </div>
    <span class="swatch-name">Rose</span><span class="token">--rose-50…300</span>
  </div>
  <div class="col" style="gap:6px;">
    <div style="display:flex;height:84px;border-radius:12px;overflow:hidden;border:1px solid var(--hairline);">
      <div style="flex:1;background:#EFE6EA;"></div>
      <div style="flex:1;background:#B89AA3;"></div>
      <div style="flex:1;background:#6B4451;"></div>
    </div>
    <span class="swatch-name">Plum</span><span class="token">--plum-50…400</span>
  </div>
</div>
</body></html>
