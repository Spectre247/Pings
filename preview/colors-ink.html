<!doctype html>
<html><head><meta charset="utf-8"><title>Ink / text</title>
<link rel="stylesheet" href="../colors_and_type.css">
<link rel="stylesheet" href="_preview.css">
</head><body>
<div style="display:grid;grid-template-columns:repeat(4,1fr);gap:14px;flex:1;">
  
<div class="col" style="gap:8px;">
  <div class="swatch" style="background:#2E211C;height:88px;"></div>
  <div class="col" style="gap:2px;">
    <span class="swatch-name">Ink</span>
    <span class="token">#2E211C</span>
  </div>
</div>
  
<div class="col" style="gap:8px;">
  <div class="swatch" style="background:#5A463F;height:88px;"></div>
  <div class="col" style="gap:2px;">
    <span class="swatch-name">Ink-2</span>
    <span class="token">#5A463F</span>
  </div>
</div>
  
<div class="col" style="gap:8px;">
  <div class="swatch" style="background:#93817A;height:88px;"></div>
  <div class="col" style="gap:2px;">
    <span class="swatch-name">Ink-3</span>
    <span class="token">#93817A</span>
  </div>
</div>
  
<div class="col" style="gap:8px;">
  <div class="swatch" style="background:#C8B9B0;height:88px;"></div>
  <div class="col" style="gap:2px;">
    <span class="swatch-name">Ink-4</span>
    <span class="token">#C8B9B0</span>
  </div>
</div>
</div>
</body></html>
