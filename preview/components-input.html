<!doctype html>
<html><head><meta charset="utf-8"><title>Inputs</title>
<link rel="stylesheet" href="../colors_and_type.css">
<link rel="stylesheet" href="_preview.css">
</head><body>
<div style="flex:1;display:flex;flex-direction:column;gap:12px;justify-content:center;max-width:520px;">
  <div style="display:flex;align-items:center;gap:10px;border:1px solid var(--hairline-2);border-radius:14px;padding:12px 16px;background:var(--bg-elevated);">
    <img src="../assets/icons/search.svg" width="18" height="18" style="opacity:.5;">
    <input placeholder="search a memory…" style="border:none;outline:none;background:transparent;font-family:var(--font-sans);font-size:15px;color:var(--ink);flex:1;">
  </div>
  <textarea placeholder="leave a small note…" style="border:1px solid var(--hairline-2);border-radius:14px;padding:14px 16px;background:var(--bg-elevated);font-family:var(--font-serif);font-size:16px;line-height:1.45;color:var(--ink);resize:none;outline:none;height:64px;font-style:italic;"></textarea>
</div>
</body></html>
