<!doctype html>
<html><head><meta charset="utf-8"><title>Radii</title>
<link rel="stylesheet" href="../colors_and_type.css">
<link rel="stylesheet" href="_preview.css">
</head><body>
<div style="display:grid;grid-template-columns:repeat(6,1fr);gap:14px;flex:1;align-items:end;">
  
  <div class="col" style="gap:8px;align-items:center;">
    <div style="width:80px;height:80px;background:var(--bg-elevated);border:1px solid var(--hairline);border-radius:6px;"></div>
    <span class="swatch-name">--r-xs</span><span class="token">6px</span>
  </div>
  <div class="col" style="gap:8px;align-items:center;">
    <div style="width:80px;height:80px;background:var(--bg-elevated);border:1px solid var(--hairline);border-radius:10px;"></div>
    <span class="swatch-name">--r-sm</span><span class="token">10px</span>
  </div>
  <div class="col" style="gap:8px;align-items:center;">
    <div style="width:80px;height:80px;background:var(--bg-elevated);border:1px solid var(--hairline);border-radius:16px;"></div>
    <span class="swatch-name">--r-md</span><span class="token">16px</span>
  </div>
  <div class="col" style="gap:8px;align-items:center;">
    <div style="width:80px;height:80px;background:var(--bg-elevated);border:1px solid var(--hairline);border-radius:22px;"></div>
    <span class="swatch-name">--r-lg</span><span class="token">22px</span>
  </div>
  <div class="col" style="gap:8px;align-items:center;">
    <div style="width:80px;height:80px;background:var(--bg-elevated);border:1px solid var(--hairline);border-radius:32px;"></div>
    <span class="swatch-name">--r-xl</span><span class="token">32px</span>
  </div>
  <div class="col" style="gap:8px;align-items:center;">
    <div style="width:80px;height:80px;background:var(--bg-elevated);border:1px solid var(--hairline);border-radius:44px;"></div>
    <span class="swatch-name">--r-2xl</span><span class="token">44px</span>
  </div>
</div>
</body></html>
