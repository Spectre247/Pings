<!doctype html>
<html><head><meta charset="utf-8"><title>Voice</title>
<link rel="stylesheet" href="../colors_and_type.css">
<link rel="stylesheet" href="_preview.css">
</head><body>
<div style="display:grid;grid-template-columns:1fr 1fr;gap:18px;flex:1;">
  <div style="border:1px solid var(--hairline);border-radius:14px;padding:18px 20px;background:var(--bg-elevated);">
    <div style="font-size:11px;color:var(--sage-300);font-weight:600;letter-spacing:0.12em;text-transform:uppercase;margin-bottom:10px;">Sounds like Pings</div>
    <div style="font-family:var(--font-serif);font-size:18px;line-height:1.4;color:var(--ink);font-style:italic;">"458 days, and I still text you good morning first."</div>
    <div style="font-family:var(--font-serif);font-size:18px;line-height:1.4;color:var(--ink);font-style:italic;margin-top:10px;">"Prague · 21 days · soon."</div>
  </div>
  <div style="border:1px solid var(--hairline);border-radius:14px;padding:18px 20px;background:var(--bg-elevated);">
    <div style="font-size:11px;color:var(--blush-500);font-weight:600;letter-spacing:0.12em;text-transform:uppercase;margin-bottom:10px;">Doesn't sound like Pings</div>
    <div style="font-size:14px;line-height:1.5;color:var(--ink-3);text-decoration:line-through;">Celebrating our amazing love story! 💕✨</div>
    <div style="font-size:14px;line-height:1.5;color:var(--ink-3);text-decoration:line-through;margin-top:6px;">My queen 👑 my world 🌍 my everything</div>
  </div>
</div>
