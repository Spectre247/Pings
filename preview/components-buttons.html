<!doctype html>
<html><head><meta charset="utf-8"><title>Buttons</title>
<link rel="stylesheet" href="../colors_and_type.css">
<link rel="stylesheet" href="_preview.css">
</head><body>
<style>
.btn{display:inline-flex;align-items:center;gap:8px;padding:11px 22px;border-radius:999px;font-family:var(--font-sans);font-size:14px;font-weight:500;letter-spacing:-0.005em;border:1px solid transparent;cursor:pointer;transition:all 140ms var(--ease-soft);}
.btn-primary{background:var(--blush-400);color:#FFFCF6;}
.btn-primary:hover{background:var(--blush-500);}
.btn-secondary{background:var(--bg-elevated);color:var(--ink);border-color:var(--hairline-2);}
.btn-secondary:hover{border-color:var(--ink-3);}
.btn-ghost{background:transparent;color:var(--ink-2);}
.btn-ghost:hover{color:var(--ink);background:var(--paper-2);}
</style>
<div style="flex:1;display:flex;align-items:center;gap:14px;flex-wrap:wrap;">
  <button class="btn btn-primary">Press play</button>
  <button class="btn btn-secondary">Read the letter</button>
  <button class="btn btn-ghost">Skip</button>
  <button class="btn btn-primary" style="background:var(--blush-500);">hover</button>
  <button class="btn btn-secondary" style="opacity:.5;cursor:not-allowed;">Disabled</button>
</div>
</body></html>
