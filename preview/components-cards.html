<!doctype html>
<html><head><meta charset="utf-8"><title>Cards</title>
<link rel="stylesheet" href="../colors_and_type.css">
<link rel="stylesheet" href="_preview.css">
</head><body>
<div style="display:grid;grid-template-columns:1fr 1fr;gap:14px;flex:1;">
  <div style="background:var(--bg-elevated);border:1px solid var(--hairline);border-radius:16px;padding:18px 20px;box-shadow:var(--shadow-1);">
    <div class="eyebrow" style="margin-bottom:8px;">CHAPTER 03</div>
    <div style="font-family:var(--font-serif);font-size:22px;letter-spacing:-0.02em;color:var(--ink);line-height:1.2;">The night the rain didn't stop</div>
    <div style="font-family:var(--font-sans);font-size:13px;color:var(--ink-3);margin-top:8px;">Mar 14, 2024 · Lisbon</div>
  </div>
  <div style="background:var(--bg-elevated);border:1px solid var(--hairline);border-radius:32px;padding:22px 24px;box-shadow:var(--shadow-2);">
    <div class="eyebrow" style="margin-bottom:8px;color:var(--blush-500);">PRAGUE — IN</div>
    <div style="font-family:var(--font-mono);font-size:32px;color:var(--ink);letter-spacing:-0.02em;">21 days</div>
    <div style="font-family:var(--font-serif);font-style:italic;font-size:14px;color:var(--ink-2);margin-top:6px;">soon.</div>
  </div>
</div>
</body></html>
