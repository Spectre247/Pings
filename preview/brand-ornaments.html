<!doctype html>
<html><head><meta charset="utf-8"><title>Ornaments</title>
<link rel="stylesheet" href="../colors_and_type.css">
<link rel="stylesheet" href="_preview.css">
</head><body>
<div style="display:grid;grid-template-columns:repeat(5,1fr);gap:12px;flex:1;">

  <div style="display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;border:1px solid var(--hairline);border-radius:14px;background:var(--bg-elevated);padding:18px 0;">
    <div style="color:var(--blush-300);"><img src="../assets/illustrations/heart.svg" width="32" height="32"></div>
    <span class="token">heart</span>
  </div>
  <div style="display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;border:1px solid var(--hairline);border-radius:14px;background:var(--bg-elevated);padding:18px 0;">
    <div style="color:var(--blush-300);"><img src="../assets/illustrations/star.svg" width="32" height="32"></div>
    <span class="token">star</span>
  </div>
  <div style="display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;border:1px solid var(--hairline);border-radius:14px;background:var(--bg-elevated);padding:18px 0;">
    <div style="color:var(--blush-300);"><img src="../assets/illustrations/envelope.svg" width="32" height="32"></div>
    <span class="token">envelope</span>
  </div>
  <div style="display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;border:1px solid var(--hairline);border-radius:14px;background:var(--bg-elevated);padding:18px 0;">
    <div style="color:var(--blush-300);"><img src="../assets/illustrations/plane.svg" width="32" height="32"></div>
    <span class="token">plane</span>
  </div>
  <div style="display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;border:1px solid var(--hairline);border-radius:14px;background:var(--bg-elevated);padding:18px 0;">
    <div style="color:var(--blush-300);"><img src="../assets/illustrations/music-note.svg" width="32" height="32"></div>
    <span class="token">music-note</span>
  </div>
</div>
</body></html>
