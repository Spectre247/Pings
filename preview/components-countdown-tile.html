<!doctype html>
<html><head><meta charset="utf-8"><title>Countdown tiles</title>
<link rel="stylesheet" href="../colors_and_type.css">
<link rel="stylesheet" href="_preview.css">
</head><body>
<div style="flex:1;display:flex;align-items:center;justify-content:center;gap:10px;">

  <div style="background:var(--bg-elevated);border:1px solid var(--hairline);border-radius:18px;padding:14px 18px;display:flex;flex-direction:column;align-items:center;min-width:78px;box-shadow:var(--shadow-glow);">
    <span style="font-family:var(--font-mono);font-size:36px;color:var(--ink);letter-spacing:-0.02em;line-height:1;">21</span>
    <span class="token" style="margin-top:6px;text-transform:uppercase;letter-spacing:0.14em;font-size:9px;">days</span>
  </div>
<span style="color:var(--ink-4);font-family:var(--font-mono);font-size:24px;">:</span>
  <div style="background:var(--bg-elevated);border:1px solid var(--hairline);border-radius:18px;padding:14px 18px;display:flex;flex-direction:column;align-items:center;min-width:78px;box-shadow:var(--shadow-1);">
    <span style="font-family:var(--font-mono);font-size:36px;color:var(--ink);letter-spacing:-0.02em;line-height:1;">04</span>
    <span class="token" style="margin-top:6px;text-transform:uppercase;letter-spacing:0.14em;font-size:9px;">hr</span>
  </div>
<span style="color:var(--ink-4);font-family:var(--font-mono);font-size:24px;">:</span>
  <div style="background:var(--bg-elevated);border:1px solid var(--hairline);border-radius:18px;padding:14px 18px;display:flex;flex-direction:column;align-items:center;min-width:78px;box-shadow:var(--shadow-1);">
    <span style="font-family:var(--font-mono);font-size:36px;color:var(--ink);letter-spacing:-0.02em;line-height:1;">33</span>
    <span class="token" style="margin-top:6px;text-transform:uppercase;letter-spacing:0.14em;font-size:9px;">min</span>
  </div>
<span style="color:var(--ink-4);font-family:var(--font-mono);font-size:24px;">:</span>
  <div style="background:var(--bg-elevated);border:1px solid var(--hairline);border-radius:18px;padding:14px 18px;display:flex;flex-direction:column;align-items:center;min-width:78px;box-shadow:var(--shadow-1);">
    <span style="font-family:var(--font-mono);font-size:36px;color:var(--ink);letter-spacing:-0.02em;line-height:1;">12</span>
    <span class="token" style="margin-top:6px;text-transform:uppercase;letter-spacing:0.14em;font-size:9px;">sec</span>
  </div>

</div>
</body></html>
