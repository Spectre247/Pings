<!doctype html>
<html><head><meta charset="utf-8"><title>Spacing scale</title>
<link rel="stylesheet" href="../colors_and_type.css">
<link rel="stylesheet" href="_preview.css">
</head><body>
<div style="flex:1;display:flex;flex-direction:column;gap:8px;justify-content:center;">
  
  <div class="row" style="gap:14px;align-items:center;">
    <span class="token" style="width:54px;flex-shrink:0;">--s-1</span>
    <div style="height:10px;width:8px;background:var(--blush-200);border-radius:3px;"></div>
    <span class="token">4px</span>
  </div>
  <div class="row" style="gap:14px;align-items:center;">
    <span class="token" style="width:54px;flex-shrink:0;">--s-2</span>
    <div style="height:10px;width:16px;background:var(--blush-200);border-radius:3px;"></div>
    <span class="token">8px</span>
  </div>
  <div class="row" style="gap:14px;align-items:center;">
    <span class="token" style="width:54px;flex-shrink:0;">--s-3</span>
    <div style="height:10px;width:24px;background:var(--blush-200);border-radius:3px;"></div>
    <span class="token">12px</span>
  </div>
  <div class="row" style="gap:14px;align-items:center;">
    <span class="token" style="width:54px;flex-shrink:0;">--s-4</span>
    <div style="height:10px;width:32px;background:var(--blush-200);border-radius:3px;"></div>

  </div>
  <div class="row" style="gap:14px;align-items:center;">
    <span class="token" style="width:54px;flex-shrink:0;">--s-5</span>

  </div>
  <div class="row" style="gap:14px;align-items:center;">
    <span class="token" style="width:54px;flex-shrink:0;">--s-6</span>
    <div style="height:10px;width:64px;background:var(--blush-200);border-radius:3px;"></div>

  </div>
  <div class="row" style="gap:14px;align-items:center;">
    <span class="token" style="width:54px;flex-shrink:0;">--s-7</span>

  <div class="row" style="gap:14px;align-items:center;">

</div>
