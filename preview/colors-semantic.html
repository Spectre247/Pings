<!doctype html>
<html><head><meta charset="utf-8"><title>Semantic colors</title>
<link rel="stylesheet" href="../colors_and_type.css">
<link rel="stylesheet" href="_preview.css">
</head><body>
<div style="display:grid;grid-template-columns:repeat(3,1fr);gap:14px;flex:1;">
  
  <div class="row" style="gap:12px;align-items:center;border:1px solid var(--hairline);border-radius:12px;padding:10px 12px;background:var(--bg-elevated);">
    <div style="width:32px;height:32px;border-radius:8px;background:#DD8569;border:1px solid rgba(0,0,0,0.06);flex-shrink:0;"></div>
    <div class="col" style="gap:1px;min-width:0;">
      <span class="swatch-name">accent</span>
      <span class="token" style="white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">Buttons, links, focus</span>
    </div>
  </div>
  <div class="row" style="gap:12px;align-items:center;border:1px solid var(--hairline);border-radius:12px;padding:10px 12px;background:var(--bg-elevated);">
    <div style="width:32px;height:32px;border-radius:8px;background:#B8C5A4;border:1px solid rgba(0,0,0,0.06);flex-shrink:0;"></div>
    <div class="col" style="gap:1px;min-width:0;">
      <span class="swatch-name">accent-2</span>
      <span class="token" style="white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">Calm sections, breath</span>
    </div>
  </div>
  <div class="row" style="gap:12px;align-items:center;border:1px solid var(--hairline);border-radius:12px;padding:10px 12px;background:var(--bg-elevated);">
    <div style="width:32px;height:32px;border-radius:8px;background:#E5C273;border:1px solid rgba(0,0,0,0.06);flex-shrink:0;"></div>
    <div class="col" style="gap:1px;min-width:0;">
      <span class="swatch-name">accent-3</span>
      <span class="token" style="white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">Special moments — rare</span>
    </div>
  </div>
  <div class="row" style="gap:12px;align-items:center;border:1px solid var(--hairline);border-radius:12px;padding:10px 12px;background:var(--bg-elevated);">
    <div style="width:32px;height:32px;border-radius:8px;background:#D67A82;border:1px solid rgba(0,0,0,0.06);flex-shrink:0;"></div>
    <div class="col" style="gap:1px;min-width:0;">
      <span class="swatch-name">love</span>
      <span class="token" style="white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">Love-note button only</span>
    </div>
  </div>
  <div class="row" style="gap:12px;align-items:center;border:1px solid var(--hairline);border-radius:12px;padding:10px 12px;background:var(--bg-elevated);">
    <div style="width:32px;height:32px;border-radius:8px;background:#E7DACB;border:1px solid rgba(0,0,0,0.06);flex-shrink:0;"></div>
    <div class="col" style="gap:1px;min-width:0;">
      <span class="swatch-name">border</span>
      <span class="token" style="white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">Hairlines · 1px default</span>
    </div>
  </div>
  <div class="row" style="gap:12px;align-items:center;border:1px solid var(--hairline);border-radius:12px;padding:10px 12px;background:var(--bg-elevated);">
    <div style="width:32px;height:32px;border-radius:8px;background:#2E211C;border:1px solid rgba(0,0,0,0.06);flex-shrink:0;"></div>
    <div class="col" style="gap:1px;min-width:0;">
      <span class="swatch-name">fg / fg-muted</span>
      <span class="token" style="white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">13:1 on paper</span>
    </div>
  </div>
</div>
</body></html>
