<!doctype html>
<html><head><meta charset="utf-8"><title>Shadows</title>
<link rel="stylesheet" href="../colors_and_type.css">
<link rel="stylesheet" href="_preview.css">
</head><body>
<div style="display:grid;grid-template-columns:repeat(4,1fr);gap:18px;flex:1;align-items:center;padding:8px 0;">
  
  <div class="col" style="gap:10px;align-items:center;">
    <div style="width:96px;height:64px;background:var(--bg-elevated);border:1px solid var(--hairline);border-radius:14px;box-shadow:0 1px 2px rgba(58,36,26,.04), 0 1px 1px rgba(58,36,26,.03);"></div>
    <span class="swatch-name">--shadow-1</span>
  </div>
  <div class="col" style="gap:10px;align-items:center;">
    <div style="width:96px;height:64px;background:var(--bg-elevated);border:1px solid var(--hairline);border-radius:14px;box-shadow:0 4px 14px rgba(58,36,26,.06), 0 1px 3px rgba(58,36,26,.04);"></div>
    <span class="swatch-name">--shadow-2</span>
  </div>
  <div class="col" style="gap:10px;align-items:center;">
    <div style="width:96px;height:64px;background:var(--bg-elevated);border:1px solid var(--hairline);border-radius:14px;box-shadow:0 14px 40px rgba(58,36,26,.10), 0 4px 12px rgba(58,36,26,.05);"></div>
    <span class="swatch-name">--shadow-3</span>
  </div>
  <div class="col" style="gap:10px;align-items:center;">
    <div style="width:96px;height:64px;background:var(--bg-elevated);border:1px solid var(--hairline);border-radius:14px;box-shadow:0 0 0 6px rgba(221,133,105,.10), 0 8px 24px rgba(221,133,105,.18);"></div>
    <span class="swatch-name">--shadow-glow</span>
  </div>
</div>
</body></html>
