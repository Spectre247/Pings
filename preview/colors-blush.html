<!doctype html>
<html><head><meta charset="utf-8"><title>Blush — primary accent</title>
<link rel="stylesheet" href="../colors_and_type.css">
<link rel="stylesheet" href="_preview.css">
</head><body>
<div style="display:grid;grid-template-columns:repeat(7,1fr);gap:10px;flex:1;">
  
  <div class="col" style="gap:6px;">
    <div class="swatch" style="background:#FCEFE8;height:84px;"></div>
    <span class="token">50</span>
    <span class="token" style="font-size:9px;">#FCEFE8</span>
  </div>
  <div class="col" style="gap:6px;">
    <div class="swatch" style="background:#F8DDD0;height:84px;"></div>
    <span class="token">100</span>
    <span class="token" style="font-size:9px;">#F8DDD0</span>
  </div>
  <div class="col" style="gap:6px;">
    <div class="swatch" style="background:#F2C2AE;height:84px;"></div>
    <span class="token">200</span>
    <span class="token" style="font-size:9px;">#F2C2AE</span>
  </div>
  <div class="col" style="gap:6px;">
    <div class="swatch" style="background:#EBA48B;height:84px;"></div>
    <span class="token">300</span>
    <span class="token" style="font-size:9px;">#EBA48B</span>
  </div>
  <div class="col" style="gap:6px;">
    <div class="swatch" style="background:#DD8569;height:84px;"></div>
    <span class="token">400</span>
    <span class="token" style="font-size:9px;">#DD8569</span>
  </div>
  <div class="col" style="gap:6px;">
    <div class="swatch" style="background:#C46A50;height:84px;"></div>
    <span class="token">500</span>
    <span class="token" style="font-size:9px;">#C46A50</span>
  </div>
  <div class="col" style="gap:6px;">
    <div class="swatch" style="background:#9C4F3D;height:84px;"></div>
    <span class="token">600</span>
    <span class="token" style="font-size:9px;">#9C4F3D</span>
  </div>
</div>
</body></html>
