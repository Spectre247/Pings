<!doctype html>
<html><head><meta charset="utf-8"><title>Sticky music player</title>
<link rel="stylesheet" href="../colors_and_type.css">
<link rel="stylesheet" href="_preview.css">
</head><body>
<div style="flex:1;display:flex;align-items:center;justify-content:center;background:var(--paper-2);border-radius:18px;border:1px solid var(--hairline);position:relative;">
  <div style="display:flex;align-items:center;gap:14px;padding:10px 16px 10px 12px;background:rgba(251,246,239,0.78);border:1px solid var(--hairline);border-radius:999px;box-shadow:var(--shadow-2);backdrop-filter:blur(20px) saturate(140%);">
    <div style="width:36px;height:36px;border-radius:999px;background:var(--blush-400);color:#FFFCF6;display:flex;align-items:center;justify-content:center;">
      <img src="../assets/icons/play.svg" width="16" height="16" style="filter:brightness(0) invert(1);margin-left:1px;">
    </div>
    <div class="col" style="gap:1px;min-width:0;">
      <span style="font-family:var(--font-serif);font-size:14px;color:var(--ink);font-style:italic;white-space:nowrap;">our song no. 1</span>
      <span class="token" style="font-size:10px;">2 : 14 · 3 : 47</span>
    </div>
    <div style="width:1px;height:20px;background:var(--hairline);"></div>
    <img src="../assets/icons/skip-forward.svg" width="18" height="18" style="opacity:0.55;">
  </div>
</div>
</body></html>
