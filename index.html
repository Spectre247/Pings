<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>happy anniversary, pings</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Newsreader:ital,opsz,wght@0,6..72,300;0,6..72,400;0,6..72,500;1,6..72,400&family=Geist:wght@400;500;600&family=Geist+Mono:wght@400;500&display=swap" rel="stylesheet">

<link rel="stylesheet" href="styles/main.css">
</head>

<body>

<!-- ===== Floating sky ===== -->
<div class="sky" aria-hidden="true">
  <div class="float f1"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#EBA48B" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3l1.6 5.6L19 10l-4.6 3 1.6 5.6L12 15.4 7.9 18.6l1.6-5.6L5 10l5.4-1.4z"/></svg></div>
  <div class="float f2"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#D67A82" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 21s-7.5-4.6-7.5-10.2A4.3 4.3 0 0 1 12 7.4a4.3 4.3 0 0 1 7.5 3.4C19.5 16.4 12 21 12 21z"/></svg></div>
  <div class="float f3"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#C7B4D6" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3l1.6 5.6L19 10l-4.6 3 1.6 5.6L12 15.4 7.9 18.6l1.6-5.6L5 10l5.4-1.4z"/></svg></div>
  <div class="float f4"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#EBA48B" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 21s-7.5-4.6-7.5-10.2A4.3 4.3 0 0 1 12 7.4a4.3 4.3 0 0 1 7.5 3.4C19.5 16.4 12 21 12 21z"/></svg></div>
  <div class="float f5"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#E5C273" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3l1.6 5.6L19 10l-4.6 3 1.6 5.6L12 15.4 7.9 18.6l1.6-5.6L5 10l5.4-1.4z"/></svg></div>
  <div class="float f6"><svg width="10" height="10" viewBox="0 0 24 24" fill="#E9A4A9" stroke="none"><circle cx="12" cy="12" r="6"/></svg></div>
  <div class="float f7"><svg width="10" height="10" viewBox="0 0 24 24" fill="#B8C5A4" stroke="none"><circle cx="12" cy="12" r="6"/></svg></div>
  <div class="float f8"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#D67A82" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 21s-7.5-4.6-7.5-10.2A4.3 4.3 0 0 1 12 7.4a4.3 4.3 0 0 1 7.5 3.4C19.5 16.4 12 21 12 21z"/></svg></div>
  <div class="float f9"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#B8C5A4" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3l1.6 5.6L19 10l-4.6 3 1.6 5.6L12 15.4 7.9 18.6l1.6-5.6L5 10l5.4-1.4z"/></svg></div>
</div>

<!-- ===== Hub ===== -->
<main class="hub">
  <div class="brandbar">
    <svg viewBox="0 0 32 32" xmlns="http://www.w3.org/2000/svg">
      <ellipse cx="16" cy="20" rx="10" ry="11" fill="#2E211C"></ellipse>
      <ellipse cx="16" cy="22" rx="6.4" ry="7.6" fill="#FBF6EF"></ellipse>
      <circle cx="12.5" cy="17" r="1.6" fill="#2E211C"></circle>
      <circle cx="19.5" cy="17" r="1.6" fill="#2E211C"></circle>
      <circle cx="13" cy="16.6" r="0.5" fill="#FBF6EF"></circle>
      <circle cx="20" cy="16.6" r="0.5" fill="#FBF6EF"></circle>
      <path d="M14.6 19.5 Q16 21 17.4 19.5 L16 21.2 Z" fill="#DD8569"></path>
      <ellipse cx="8" cy="19" rx="2.4" ry="3.6" fill="#2E211C" transform="rotate(-18 8 19)"></ellipse>
      <ellipse cx="24" cy="19" rx="2.4" ry="3.6" fill="#2E211C" transform="rotate(18 24 19)"></ellipse>
      <ellipse cx="11.5" cy="9" rx="3" ry="2.5" fill="#F2C2AE" opacity="0.7"></ellipse>
    </svg>
    pings
  </div>

  <div class="eyebrow">may 16, 2026</div>
  <h1 class="title">Happy anniversary, pings</h1>

  <div class="daycount">
    <span><span class="daycount-num" id="daysTogether">—</span> days, us</span>
    <span class="pip"></span>
    <span><span class="daycount-num" id="daysToPrague">—</span> until prague</span>
  </div>

  <!-- Section cards -->
  <div class="cards">
    <button class="card moments" data-modal="moments">
      <h2 class="card-title">Moments</h2>
      <p class="card-sub">Cute moments i love</p>
      <span class="card-cta">open the gallery <span class="arrow">→</span></span>
      <span class="card-icon">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <rect x="3" y="5" width="18" height="14" rx="2"></rect>
          <circle cx="9" cy="11" r="2"></circle>
          <path d="M3 17l5-5 4 4 3-3 6 6"></path>
        </svg>
      </span>
    </button>

    <button class="card love" data-modal="love">
      <h2 class="card-title">Things I Love<br>About You</h2>
      <p class="card-sub" style="font-size:22px;">👀</p>
      <span class="card-cta">read them <span class="arrow">→</span></span>
      <span class="card-icon">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="currentColor"><path d="M12 21s-7.5-4.6-7.5-10.2A4.3 4.3 0 0 1 12 7.4a4.3 4.3 0 0 1 7.5 3.4C19.5 16.4 12 21 12 21z"></path></svg>
      </span>
    </button>

    <button class="card letter" data-modal="letter">
      <h2 class="card-title">A Letter<br>For You</h2>
      <p class="card-sub">Might be a little Cringe xD</p>
      <span class="card-cta">open the letter <span class="arrow">→</span></span>
      <span class="card-icon">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <rect x="3" y="5" width="18" height="14" rx="2"></rect>
          <path d="m3 7 9 6 9-6"></path>
        </svg>
      </span>
    </button>

    <button class="card plans" data-modal="plans">
      <h2 class="card-title">Future Plans</h2>
      <p class="card-sub">I am stuck planning all the plans xD</p>
      <span class="card-cta">see what's next <span class="arrow">→</span></span>
      <span class="card-icon">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M20 10c0 7-8 13-8 13s-8-6-8-13a8 8 0 0 1 16 0Z"></path>
          <circle cx="12" cy="10" r="3"></circle>
        </svg>
      </span>
    </button>
  </div>

  <p class="foot">Made with love, learning html and claude xD</p>
</main>

<!-- ===== Scrim & modal shell ===== -->
<div class="scrim" id="scrim"></div>

<!-- MOMENTS -->
<div class="modal" id="modal-moments" role="dialog" aria-labelledby="t-moments">
  <div class="modal-head">
    <div>
      <h2 class="modal-title" id="t-moments"><em>Moments</em></h2>
    </div>
    <button class="modal-close" data-close aria-label="close">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"><path d="M6 6l12 12M6 18L18 6"></path></svg>
    </button>
  </div>
  <div class="modal-body">
    <div class="gallery" id="gallery"></div>
  </div>
</div>

<!-- LOVE -->
<div class="modal" id="modal-love" role="dialog" aria-labelledby="t-love">
  <div class="modal-head">
    <div>
      <h2 class="modal-title">Things I <em>Love</em></h2>
    </div>
    <button class="modal-close" data-close aria-label="close">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"><path d="M6 6l12 12M6 18L18 6"></path></svg>
    </button>
  </div>
  <div class="modal-body">
    <div class="love-list" id="loveList"></div>
  </div>
</div>

<!-- LETTER -->
<div class="modal" id="modal-letter" role="dialog" aria-labelledby="t-letter">
  <div class="modal-head">
    <div>
      <h2 class="modal-title">A <em>Letter</em></h2>
    </div>
    <button class="modal-close" data-close aria-label="close">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"><path d="M6 6l12 12M6 18L18 6"></path></svg>
    </button>
  </div>
  <div class="modal-body">
    <article class="letter-sheet">
      <div class="letter-date" id="letterDate"></div>
      <p class="letter-greet" id="letterGreet"></p>
      <div class="letter-body" id="letterBody"></div>
      <div class="letter-sign" id="letterSign"></div>
    </article>
  </div>
</div>

<!-- PLANS -->
<div class="modal" id="modal-plans" role="dialog" aria-labelledby="t-plans">
  <div class="modal-head">
    <div>
      <h2 class="modal-title">Future <em>Plans</em></h2>
    </div>
    <button class="modal-close" data-close aria-label="close">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"><path d="M6 6l12 12M6 18L18 6"></path></svg>
    </button>
  </div>
  <div class="modal-body">
    <div class="plan-prague">
      <h3>Prague</h3>
      <div class="when">may 29</div>
      <div class="tiles" id="tiles">
        <div class="tile first"><span class="tile-num" id="t-d">21</span><span class="tile-lbl">days</span></div>
        <div class="tile"><span class="tile-num" id="t-h">04</span><span class="tile-lbl">hours</span></div>
        <div class="tile"><span class="tile-num" id="t-m">33</span><span class="tile-lbl">min</span></div>
        <div class="tile"><span class="tile-num" id="t-s">12</span><span class="tile-lbl">sec</span></div>
      </div>
    </div>
    <div class="future-list" id="futureList"></div>
  </div>
</div>

<script src="scripts/main.js"></script>
</body>
</html>
